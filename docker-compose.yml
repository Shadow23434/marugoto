version: "3.8"

services:
  # --- 1. Infrastructure ---
  postgres:
    image: postgres:15-alpine
    container_name: marugoto_postgres
    environment:
      POSTGRES_DB: dev_marugoto
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marugoto-net

  #  redis:
  #    image: redis:7-alpine
  #    container_name: marugoto_redis
  #    volumes:
  #      - redis_data:/data
  #    networks:
  #      - marugoto-net

  #  elasticsearch:
  #    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  #    container_name: marugoto_elasticsearch
  #    environment:
  #      - discovery.type=single-node
  #      - xpack.security.enabled=false
  #      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  #    volumes:
  #      - elasticsearch_data:/usr/share/elasticsearch/data
  #    networks:
  #      - marugoto-net

  # --- 2. Backend Application ---
  backend-app:
    build: .
    container_name: marugoto_backend
    environment:
      - SPRING_JPA_OPEN_IN_VIEW=true
      - SPRING_DATASOURCE_URL=${DB_URL}
      - SPRING_DATASOURCE_USERNAME=${DB_USERNAME}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=${REDIS_HOST}
      - SPRING_ELASTICSEARCH_URIS=${ELASTIC_URI}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
    depends_on:
      - postgres
    #      - redis
    #      - elasticsearch
    networks:
      - marugoto-net

  # --- 3. Frontend Application ---
  web-server:
    image: nginx:alpine
    container_name: marugoto_frontend
    build:
      context: ./frontend-dist
      dockerfile: Dockerfile
    ports:
      - "80:80"
    # volumes:
    #   - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend-app
    networks:
      - marugoto-net

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  marugoto-net:
