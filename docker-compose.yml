version: "3.8"

services:
  # --- 1. Infrastructure ---
  postgres:
    image: postgres:15-alpine
    container_name: marugoto_postgres
    environment:
      POSTGRES_DB: dev_marugoto
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - marugoto-net

  #  redis:
  #    image: redis:7-alpine
  #    container_name: marugoto_redis
  #    volumes:
  #      - redis_data:/data
  #    networks:
  #      - marugoto-net

  #  elasticsearch:
  #    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
  #    container_name: marugoto_elasticsearch
  #    environment:
  #      - discovery.type=single-node
  #      - xpack.security.enabled=false
  #      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
  #    volumes:
  #      - elasticsearch_data:/usr/share/elasticsearch/data
  #    networks:
  #      - marugoto-net

  # --- 2. Backend Application ---
  backend-app:
    build: .
    container_name: marugoto_backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/dev_marugoto
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=1
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_ELASTICSEARCH_URIS=http://elasticsearch:9200
      - JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    depends_on:
      - postgres
    #      - redis
    #      - elasticsearch
    networks:
      - marugoto-net

  # --- 3. Frontend Application ---
  web-server:
    image: nginx:alpine
    container_name: marugoto_frontend
    build:
      context: ./frontend-dist
      dockerfile: Dockerfile
    ports:
      - "80:80"
    # volumes:
    #   - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend-app
    networks:
      - marugoto-net

volumes:
  postgres_data:
  redis_data:
  elasticsearch_data:

networks:
  marugoto-net:
