<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARUGOTO Plus (Starter A1)</title>

    <link rel="stylesheet" href="assets/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/assets/css/toast.css">
    <link rel="stylesheet" href="/assets/css/auth.css">
</head>

<body>

    <div class="main-wrapper">
        <div class="auth-card">       
            <!-- Left Side: Visual/Branding -->
            <div class="auth-visual text-center d-flex flex-column justify-content-between">
                <div class="auth-visual-content text-center mb-5">
                    <h2>Learn Japanese<br>and Culture</h2>
                    <!-- <p class="fs-5">Discover Japanese language and culture through interesting lessons based on the JF Standard.</p> -->
                </div>
                <div class="text-center auth-visual-content">
                    <small style="opacity: 0.8">© The Japan Foundation</small>
                </div>
            </div>

            <!-- Right Side: Forms -->
            <div class="auth-form-container">
                <div class="logo-area">
                    <img src="./assets/images/common/logo_head-jp.png" alt="まるごと＋ 日本のことばと文化 MARUGOTO Plus Japanese Leaning">
                </div>

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
                    <button class="auth-tab-btn" id="tab-register" onclick="switchTab('register')">Register</button>
                </div>

                <!-- Login Form -->
                <div id="login-form" class="form-section active">
                    <form>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="loginUsername" placeholder="Username" required>
                            <label for="loginUsername">Username</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="loginPassword" placeholder="Password" required>
                            <label for="loginPassword">Password</label>
                        </div>
                        
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                <label class="form-check-label text-secondary" style="font-size: 0.9rem;" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <!-- <a href="#" class="text-primary" style="font-size: 0.9rem;">Forgot password?</a> -->
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fs-6 text-uppercase">Login</button>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="register-form" class="form-section">
                    <form>
                        <div class="form-floating mb-3">
                            <input type="text" class="form-control" id="regUsername" placeholder="Username" required>
                            <label for="regUsername">Username</label>
                        </div>
                        <div class="form-floating mb-3">
                            <input type="password" class="form-control" id="regPassword" placeholder="Password" required>
                            <label for="regPassword">Password</label>
                        </div>
                        <div class="form-floating mb-4">
                            <input type="password" class="form-control" id="regConfirmPassword" placeholder="Confirm Password" required>
                            <label for="regConfirmPassword">Confirm Password</label>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fs-6 text-uppercase">Create Account</button>
                    </form>
                </div>

            </div>
        </div>
    </div>

    <script src="assets/bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/api-config.js"></script>
    <script src="assets/js/common/toast.js"></script>
    <script src="assets/js/common/error-handler.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        if (localStorage.getItem('isLoggedIn')) {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
